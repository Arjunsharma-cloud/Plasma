# Rate limiting zone (NGINX level - second layer of defense)
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=100r/s;

upstream api_gateway_backend {
    # Load balancing across 3 gateway instances
    server api-gateway-1:8080 max_fails=3 fail_timeout=30s;
    server api-gateway-2:8081 max_fails=3 fail_timeout=30s;
    server api-gateway-3:8082 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;
    
    # Health check endpoint (no rate limit)
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
    
    # Rate limiting at NGINX level (burst of 20, no delay)
    location / {
        limit_req zone=mylimit burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://api_gateway_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}